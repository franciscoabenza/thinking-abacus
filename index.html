<style>
    :root {
        --primary-color: #bfff00;
        --bg-color: #000;
        --text-color: #fff;
        --transition: all 0.3s ease;
    }

    html {
        scroll-behavior: smooth;
    }

    html, body {
        min-height: 100vh;
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        overflow-x: hidden;
    }

    body {
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        line-height: 1.6;
        position: relative;
    }

    .hero-section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
        overflow: hidden;
    }

    /* Subtle white ambient glow */
    .hero-section::before,
    .hero-section::after {
        content: '';
        position: absolute;
        width: 300%;
        height: 300%;
        top: -100%;
        left: -100%;
        background: radial-gradient(circle at center, 
            rgba(255,255,255,0.03) 0%,
            rgba(255,255,255,0.01) 30%,
            rgba(0,0,0,0) 70%
        );
        animation: breathe 15s ease-in-out infinite;
        z-index: 0;
    }

    .hero-section::after {
        background: radial-gradient(circle at center, 
            rgba(255,255,255,0.02) 0%,
            rgba(255,255,255,0.005) 40%,
            rgba(0,0,0,0) 80%
        );
        animation: breathe 20s ease-in-out infinite reverse;
        z-index: 0;
    }

    /* Add the alive corner glow */
    .corner-glow {
        content: '';
        position: fixed;
        width: 100%;
        height: 100%;
        bottom: 0;
        right: 0;
        background: radial-gradient(circle at bottom right, 
            rgba(191,255,0,0.2) 0%,
            rgba(191,255,0,0.05) 20%,
            rgba(191,255,0,0.01) 40%,
            rgba(0,0,0,0) 70%
        );
        animation: pulse 4s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
    }

    /* Particles container */
    .particles-container {
        position: fixed;
        bottom: 0;
        right: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
        z-index: 1;
    }

    .particle {
        position: absolute;
        background-color: rgba(191, 255, 0, 0.5);
        border-radius: 50%;
        box-shadow: 0 0 6px rgba(191, 255, 0, 0.3);
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    @keyframes pulse {
        0%, 100% {
            opacity: 0.6;
            transform: scale(1);
        }
        50% {
            opacity: 1;
            transform: scale(1.05);
        }
    }
    
    @keyframes breathe {
        0%, 100% {
            transform: scale(1) rotate(0deg);
            opacity: 0.5;
        }
        25% {
            transform: scale(1.2) rotate(5deg);
            opacity: 0.7;
        }
        50% {
            transform: scale(1) rotate(0deg);
            opacity: 0.5;
        }
        75% {
            transform: scale(0.8) rotate(-5deg);
            opacity: 0.3;
        }
    }

    .logo-container {
        position: relative;
        z-index: 2;
        margin-bottom: 2rem;
        transition: var(--transition);
        user-select: none;
    }

    .logo-container:hover {
        transform: scale(1.05);
    }

    img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
        filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        -webkit-user-drag: none;
        -khtml-user-drag: none;
        -moz-user-drag: none;
        -o-user-drag: none;
        pointer-events: none;
    }

    .center-content {
        text-align: center;
        padding: 2rem;
        position: relative;
        z-index: 1;
    }

    h5 {
        color: rgba(255, 255, 255, 0.8);
        font-family: 'MuseoModerno', sans-serif;
        font-weight: 500;
        font-size: 0.8rem;
        margin: 2rem 0;
        line-height: 1.8;
        text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
    }

    a {
        color: var(--text-color);
        text-decoration: none;
        transition: var(--transition);
        position: relative;
    }

    a:hover {
        color: var(--primary-color);
    }

    a::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: var(--primary-color);
        transition: var(--transition);
    }

    a:hover::after {
        width: 100%;
    }

    hr {
        border: 0;
        height: 2px;
        background: linear-gradient(to right, 
            transparent, 
            var(--primary-color), 
            transparent
        );
        margin: 2rem 0;
    }

    @media (max-width: 768px) {
        body {
            padding: 2rem 1rem;
        }
        
        h5 {
            font-size: 1rem;
        }
    }
</style>

<!-- Biomimicry Particles Animation -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const particlesContainer = document.getElementById('particles');
    const particleCount = 55; // Increased particle count
    const particles = [];
    
    let mouseX = window.innerWidth;
    let mouseY = window.innerHeight;
    
    // Track mouse position
    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      // Update excitement based on proximity to bottom right corner
      updateParticleExcitement();
    });
    
    function createParticle() {
      const particle = document.createElement('div');
      particle.className = 'particle';
      
      // Random properties for each particle
      const size = Math.random() * 6 + 1;
      
      // Position particles with higher concentration in bottom right
      const rightBias = Math.random() * Math.random(); // Bias toward right
      const bottomBias = Math.random() * Math.random(); // Bias toward bottom
      
      const posX = window.innerWidth * (0.3 + 0.7 * rightBias);
      const posY = window.innerHeight * (0.3 + 0.7 * bottomBias);
      
      let speed = Math.random() * 0.5 + 0.2;
      let opacity = Math.random() * 0.4 + 0.1;
      let direction = Math.random() * 360;
      
      // Random subtle color variations
      const hue = 75 + Math.random() * 10; // Green-yellow
      const saturation = 90 + Math.random() * 10;
      const lightness = 50 + Math.random() * 10;
      
      // Set initial styles
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${posX}px`;
      particle.style.top = `${posY}px`;
      particle.style.opacity = opacity;
      particle.style.backgroundColor = `hsla(${hue}, ${saturation}%, ${lightness}%, 0.5)`;
      
      // Occasionally create different particle shapes
      if (Math.random() < 0.1) {
        particle.style.borderRadius = '40% 60% 60% 40% / 60% 30% 70% 40%'; // Organic shape
        particle.style.animation = `morphShape ${2 + Math.random() * 4}s ease-in-out infinite alternate`;
      }
      
      // Save initial properties in an object for animation reference
      const properties = {
        size,
        posX,
        posY,
        speed,
        opacity,
        direction,
        baseSpeed: speed,
        baseOpacity: opacity,
        phase: Math.random() * Math.PI * 2, // Random phase for sine movement
        phaseSpeed: 0.01 + Math.random() * 0.02
      };
      
      particlesContainer.appendChild(particle);
      particles.push({ element: particle, properties });
    }
    
    function updateParticleExcitement() {
      // Bottom right corner coordinates
      const cornerX = window.innerWidth;
      const cornerY = window.innerHeight;
      
      particles.forEach(p => {
        // Calculate distance from mouse to particle
        const dx = p.properties.posX - mouseX;
        const dy = p.properties.posY - mouseY;
        const mouseDistance = Math.sqrt(dx * dx + dy * dy);
        
        // Calculate distance from corner to particle
        const cdx = cornerX - p.properties.posX;
        const cdy = cornerY - p.properties.posY;
        const cornerDistance = Math.sqrt(cdx * cdx + cdy * cdy);
        
        // Calculate excitement factor based on proximity to corner
        const maxDistance = Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight);
        const cornerProximity = 1 - (cornerDistance / maxDistance);
        const cornerExcitement = 1 + (4 * Math.pow(cornerProximity, 2));
        
        // Calculate excitement factor based on mouse proximity
        const mouseExcitement = mouseDistance < 200 ? 1 + (2 * (1 - mouseDistance / 200)) : 1;
        
        // Apply excitement
        p.properties.speed = p.properties.baseSpeed * cornerExcitement * mouseExcitement;
        p.properties.opacity = Math.min(0.9, p.properties.baseOpacity * (1 + cornerProximity * 2));
        
        // Update particle appearance
        p.element.style.opacity = p.properties.opacity;
        
        // Scale particles based on excitement
        const scale = 1 + cornerProximity * 0.5;
        p.element.style.transform = `scale(${scale})`;
        
        // Add a glow effect intensified by corner proximity
        const glowIntensity = 6 + (cornerProximity * 8);
        p.element.style.boxShadow = `0 0 ${glowIntensity}px rgba(191, 255, 0, ${0.3 + cornerProximity * 0.4})`;
      });
    }
    
    function animateParticles() {
      particles.forEach(p => {
        // Update phase for organic movement
        p.properties.phase += p.properties.phaseSpeed;
        
        // Convert direction to radians
        const directionRad = p.properties.direction * (Math.PI / 180);
        
        // Calculate organic movement based on direction, speed and sine waves
        const sineOffset = Math.sin(p.properties.phase) * 0.5;
        p.properties.posX += (Math.cos(directionRad) + sineOffset * Math.cos(directionRad + Math.PI/2)) * p.properties.speed;
        p.properties.posY += (Math.sin(directionRad) + sineOffset * Math.sin(directionRad + Math.PI/2)) * p.properties.speed;
        
        // Bounce off edges with slight angle variation for more natural movement
        if (p.properties.posX < 0) {
          p.properties.posX = 0;
          p.properties.direction = 180 - p.properties.direction + (Math.random() * 20 - 10);
        } else if (p.properties.posX > window.innerWidth) {
          p.properties.posX = window.innerWidth;
          p.properties.direction = 180 - p.properties.direction + (Math.random() * 20 - 10);
        }
        
        if (p.properties.posY < 0) {
          p.properties.posY = 0;
          p.properties.direction = 360 - p.properties.direction + (Math.random() * 20 - 10);
        } else if (p.properties.posY > window.innerHeight) {
          p.properties.posY = window.innerHeight;
          p.properties.direction = 360 - p.properties.direction + (Math.random() * 20 - 10);
        }
        
        // Normalize direction to 0-360
        p.properties.direction = p.properties.direction % 360;
        if (p.properties.direction < 0) p.properties.direction += 360;
        
        // Particles tend to move toward bottom right corner
        if (Math.random() < 0.02) {
          // Calculate direction toward bottom right
          const targetDirection = Math.atan2(
            window.innerHeight - p.properties.posY,
            window.innerWidth - p.properties.posX
          ) * (180 / Math.PI);
          
          // Gradually adjust current direction toward target (biomimicry flocking behavior)
          const angleDistance = (targetDirection - p.properties.direction) % 360;
          const shorterAngleDistance = angleDistance > 180 ? angleDistance - 360 : (angleDistance < -180 ? angleDistance + 360 : angleDistance);
          p.properties.direction += shorterAngleDistance * 0.05;
        }
        
        // Update position
        p.element.style.left = `${p.properties.posX}px`;
        p.element.style.top = `${p.properties.posY}px`;
      });
      
      requestAnimationFrame(animateParticles);
    }
    
    // Create initial particles
    for (let i = 0; i < particleCount; i++) {
      createParticle();
    }
    
    // Add CSS for morphing animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes morphShape {
        0% { border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%; }
        25% { border-radius: 40% 60% 70% 30% / 50% 60% 30% 60%; }
        50% { border-radius: 60% 40% 30% 70% / 60% 40% 60% 40%; }
        75% { border-radius: 70% 30% 50% 50% / 40% 60% 50% 60%; }
        100% { border-radius: 30% 70% 70% 30% / 50% 40% 60% 50%; }
      }
    `;
    document.head.appendChild(style);
    
    // Start animation
    updateParticleExcitement();
    animateParticles();
    
    // Handle window resize
    window.addEventListener('resize', function() {
      // Adjust particles to new window size
      particles.forEach(p => {
        if (p.properties.posX > window.innerWidth) {
          p.properties.posX = window.innerWidth * Math.random();
        }
        if (p.properties.posY > window.innerHeight) {
          p.properties.posY = window.innerHeight * Math.random();
        }
      });
    });
  });
</script>
