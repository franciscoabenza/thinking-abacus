<style>
    :root {
        --primary-color: #bfff00;
        --bg-color: #000;
        --text-color: #fff;
        --transition: all 0.3s ease;
    }

    html {
        scroll-behavior: smooth;
    }

    html, body {
        min-height: 100vh;
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        overflow-x: hidden;
    }

    body {
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        line-height: 1.6;
        position: relative;
    }

    .hero-section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
        overflow: hidden;
    }

    .hero-section::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(191,255,0,0.1) 0%, rgba(0,0,0,0) 70%);
        animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .logo-container {
        position: relative;
        z-index: 1;
        margin-bottom: 2rem;
        transition: var(--transition);
    }

    .logo-container:hover {
        transform: scale(1.05);
    }

    img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
        filter: drop-shadow(0 0 10px rgba(191,255,0,0.3));
    }

    .center-content {
        text-align: center;
        padding: 2rem;
        position: relative;
        z-index: 1;
    }

    h5 {
        color: rgba(255, 255, 255, 0.8);
        font-family: 'MuseoModerno', sans-serif;
        font-weight: 700;
        font-size: 1.2rem;
        margin: 2rem 0;
        line-height: 1.8;
        text-shadow: 0 0 20px rgba(191,255,0,0.2);
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
    }

    a {
        color: var(--text-color);
        text-decoration: none;
        transition: var(--transition);
        position: relative;
    }

    a:hover {
        color: var(--primary-color);
    }

    a::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 0;
        background-color: var(--primary-color);
        transition: var(--transition);
    }

    a:hover::after {
        width: 100%;
    }

    hr {
        border: 0;
        height: 2px;
        background: linear-gradient(to right, 
            transparent, 
            var(--primary-color), 
            transparent
        );
        margin: 2rem 0;
    }

    @media (max-width: 768px) {
        body {
            padding: 2rem 1rem;
        }
        
        h5 {
            font-size: 1rem;
        }
    }
</style>

</head>

<body>
    <div class="hero-section">

                <h5 class="animate__animated animate__fadeInUp">Augmented Epistemology • Decision Making • Agentic Applications • Behavioural Software • HCI • Meta-Learning • UX • AI • Forecasting</h5>
            </div>
        </div>
    </div>
